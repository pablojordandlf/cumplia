<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88">
  <!-- Background -->
  <rect width="88" height="88" rx="20" fill="#0B1C3D"/>
  <!-- Arc principal -->
  <path d="M74 44 A30 30 0 1 1 62 18" stroke="#F0EEE8" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Arc interior -->
  <path d="M64 44 A20 20 0 1 1 55.4 25.4" stroke="rgba(240,238,232,0.14)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Connector line -->
  <line x1="62" y1="18" x2="67" y2="14" stroke="rgba(240,238,232,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Node outer + chartreuse fill -->
  <circle cx="67" cy="14" r="7" fill="#E8FF47"/>
  <!-- Node dark dot -->
  <circle cx="67" cy="14" r="2.8" fill="#0B1C3D"/>
</svg>
